<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安安百宝箱</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #1f2937; margin-bottom: 30px; }
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tool-btn {
            display: block;
            padding: 15px 20px;
            background-color: #f8fafc;
            color: #333;
            text-decoration: none;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tool-btn:hover {
            background-color: #1d4ed8;
            color: white;
            border-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2);
        }
        /* 检测中状态 */
        .tool-btn.checking {
            pointer-events: none;
            opacity: .65;
        }
        .footer { margin-top: 30px; font-size: 12px; color: #9ca3af; }

        /* ---- 内网提示弹窗 ---- */
        .anan-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 0; visibility: hidden;
            transition: all 0.3s;
        }
        .anan-mask.show { opacity: 1; visibility: visible; }
        .anan-tip-box {
            background: white; padding: 30px 40px; border-radius: 12px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 80%;
            animation: popIn .3s ease;
        }
        @keyframes popIn {
            from { transform: scale(.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .anan-tip-text {
            font-size: 16px; color: #333;
            margin-bottom: 20px; line-height: 1.6;
        }
        .anan-close-btn {
            padding: 8px 20px; background: #1d4ed8; color: white;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; transition: background 0.2s;
        }
        .anan-close-btn:hover { background: #1e40af; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ 安安百宝箱</h1>
        <div class="tool-list">
            <a href="image-compare.html" class="tool-btn">🖼️ 多图对比</a>
            <a href="session-compare.html" class="tool-btn">📊 Session 多轮对比</a>

            <!-- ★ 需要内网的工具：用 onclick 拦截，先检测再跳转 -->
            <div class="tool-btn" onclick="checkIntranet(
                'https://71c5a476-8000.boz.alibaba-inc.com',
                'https://71c5a476-8000.boz.alibaba-inc.com/api/ping',
                this
            )">🔗 图片批量转内部URL</div>

            <a href="https://excalidraw.com/" target="_blank" rel="noopener noreferrer" class="tool-btn">🎨 画板 | excalidraw</a>
        </div>
        <div class="footer">© 2026 Anan Tools</div>
    </div>

    <!-- 内网不可用提示弹窗 -->
    <div class="anan-mask" id="ananMask" onclick="if(event.target===this)closeMask()">
        <div class="anan-tip-box">
            <div class="anan-tip-text">安安提示：不行哦不行哦，要使用这个小工具要连接内网哦 ₍₍ ᕕ(´◔⌓◔)ᕗ⁾⁾</div>
            <button class="anan-close-btn" onclick="closeMask()">知道啦</button>
        </div>
    </div>

    <script>
    /**
     * 内网检测跳转（兼容手机端）
     *
     * 修复两个手机端问题：
     * 1. DNS 劫持/代理导致 fetch 不报错 → 改为严格校验响应体 {"ok":true}
     * 2. 异步中 window.open 被拦截为空白页 → 同步预开窗口，检测后决定跳转或关闭
     */
    async function checkIntranet(toolUrl, pingUrl, btn) {
        if (btn.classList.contains('checking')) return;
        btn.classList.add('checking');
        const originalText = btn.textContent;
        btn.textContent = originalText + ' ⏳';

        // ★ 关键：在用户点击的同步上下文中预先打开窗口
        // 手机浏览器要求 window.open 必须在用户手势的同步调用栈中，
        // 否则会被当成弹窗广告拦截或打开空白页
        var newWin = window.open('about:blank', '_blank');

        var isIntranet = false;
        try {
            var ctrl = new AbortController();
            var tid = setTimeout(function() { ctrl.abort(); }, 2000);
            var res = await fetch(pingUrl, { mode: 'cors', signal: ctrl.signal });
            clearTimeout(tid);

            // ★ 关键：严格校验响应内容，防止 DNS 劫持/代理返回假响应
            if (res.ok) {
                var data = await res.json();
                isIntranet = data && data.ok === true;
            }
        } catch (e) {
            isIntranet = false;
        }

        if (isIntranet) {
            // 内网可达 → 跳转
            if (newWin) {
                newWin.location.href = toolUrl;
            } else {
                location.href = toolUrl;
            }
        } else {
            // 不在内网 → 关闭预开的窗口，弹提示
            if (newWin) newWin.close();
            document.getElementById('ananMask').classList.add('show');
        }

        btn.classList.remove('checking');
        btn.textContent = originalText;
    }

    function closeMask() {
        document.getElementById('ananMask').classList.remove('show');
    }
    </script>
</body>
</html>
